<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>FelSecure - Links</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>
    <script>
        window.addEventListener('DOMContentLoaded', () => 
        VANTA.NET({
            el: "#vanta",
            mouseControls: true,
            touchControls: true,
            gyroControls: false,
            minHeight: 200.00,
            minWidth: 200.00,
            scale: 1.00,
            scaleMobile: 1.00,
            backgroundColor: 0x4c4d4c
            })
        )
        
    </script>
  </head>
  <div id="vanta"></div>
  <body>

    <main>

        <header>
            <img src="./assests/users-avatar-svgrepo-com.svg" />
          <h1>@felsecure</h1>
        </header>
    
        <ul>
          <li >
            <a href="https://www.felixinbytes.github.io/">
                <img src="./assests/web-design-svgrepo-com.svg" alt="homepage" width="20" />
            Official Website
            </a>
        </li>
          <li>
            <a href="https://www.felixinbytes.github.io/">
                <img src="./assests/Twitter-logo.svg"  alt="twitter" width="20" />
            Twitter
        </a>
        </li>
          <li>
            <a href="https://github.com/FelixInBytes/">
                <img src="./assests/github-mark.png"  alt="github" width="20" />
            Github
        </a>
        </li>
          <li>
            <a href="https://www.felixinbytes.github.io/">
                <img src="./assests/LI-In-Bug.png"   alt="linkedin" width="20"/>
            LinkedIn
        </a>
        </li>
        </ul>
      </body>

    </main>
    
</html>
